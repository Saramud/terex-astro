<!doctype html>
<html>
  <head>
    <style>
      body {
        margin: 0;
        font-family: Arial;
        background: #fff;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(4, 300px);
        gap: 8px;
        padding: 8px;
      }
      .cell {
        border: 1px solid #ddd;
        border-radius: 8px;
        text-align: center;
        padding: 4px;
      }
      .cell img {
        width: 100%;
        display: block;
      }
      .cell.dark {
        background: #1f1f1f;
        color: #fff;
      }
      .cell p {
        margin: 2px 0 4px;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <div class="grid">
      <div class="cell">
        <img src="../../public/img/cat/autokrans.svg" />
        <p>Автокраны</p>
      </div>
      <div class="cell">
        <img src="../../public/img/cat/manipulators.svg" />
        <p>Манипуляторы</p>
      </div>
      <div class="cell">
        <img src="../../public/img/cat/mini-pogruzchiki.svg" />
        <p>Мини-погрузчики</p>
      </div>
      <div class="cell">
        <img src="../../public/img/cat/mini-excavatory.svg" />
        <p>Мини-экскаваторы</p>
      </div>
      <div class="cell">
        <img src="../../public/img/cat/samosavls.svg" />
        <p>Самосвалы</p>
      </div>
      <div class="cell">
        <img src="../../public/img/cat/teleskopicheskie-pogruzchiki.svg" />
        <p>Телескопические</p>
      </div>
      <div class="cell">
        <img src="../../public/img/cat/frontalnye-pogruzchiki.svg" />
        <p>Фронтальные</p>
      </div>
      <div class="cell">
        <img src="../../public/img/cat/excavatory-gusenichnye.svg" />
        <p>Гусеничные</p>
      </div>
      <div class="cell">
        <img src="../../public/img/cat/excavatory-kolesnye.svg" />
        <p>Колёсные</p>
      </div>
      <div class="cell">
        <img src="../../public/img/cat/excavatory-pogruzchiki.svg" />
        <p>Экскаваторы-погрузчики</p>
      </div>
      <div class="cell dark">
        <img src="../../public/img/hero-excavator.svg" />
        <p>Hero (тёмный фон)</p>
      </div>
    </div>
  </body>
</html>
