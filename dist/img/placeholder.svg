<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#f4f4f4"/>
  <rect width="400" height="4" fill="#ffc61a"/>
  <rect y="296" width="400" height="4" fill="#ffc61a"/>
  <!-- camera body -->
  <rect x="148" y="108" width="104" height="74" rx="10" fill="none" stroke="#cccccc" stroke-width="5"/>
  <!-- lens outer -->
  <circle cx="200" cy="145" r="24" fill="none" stroke="#cccccc" stroke-width="5"/>
  <!-- lens inner -->
  <circle cx="200" cy="145" r="10" fill="#cccccc"/>
  <!-- viewfinder bump -->
  <rect x="176" y="100" width="48" height="14" rx="5" fill="#cccccc"/>
  <!-- flash dot -->
  <circle cx="230" cy="120" r="5" fill="#cccccc"/>
  <!-- label -->
  <text x="200" y="222" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="600" letter-spacing="1" fill="#b0b0b0">Фото скоро</text>
</svg>
